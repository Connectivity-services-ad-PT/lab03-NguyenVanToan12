name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start mock servers and run Newman tests
        run: |
          ./node_modules/.bin/prism mock contracts/analytics-alert.openapi.yaml -p 4010 --host 127.0.0.1 > prism-analytics.log 2>&1 < /dev/null &
          ./node_modules/.bin/prism mock contracts/iot-ingestion.openapi.yaml -p 4011 --host 127.0.0.1 > prism-iot.log 2>&1 < /dev/null &
          disown -a
          ./node_modules/.bin/wait-on http://127.0.0.1:4010/health http://127.0.0.1:4011/health --timeout 30000
          npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-analytics.log || true
          cat prism-iot.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
